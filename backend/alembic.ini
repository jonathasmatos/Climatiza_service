# Alembic — Climatiza Service
# Migrações para o banco PostgreSQL

[alembic]
script_location = alembic
sqlalchemy.url = postgresql://climatiza:climatiza_dev@climatiza-postgres:5432/climatiza

file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
revision_environment = false
timezone = America/Belem

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S
