  #     - /etc/localtime:/etc/localtime:ro
  #     - /etc/timezone:/etc/timezone:ro
  #   networks:
  #     - rede-interna
  #     - ticketz-traefik_ticketz
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   labels:
  #     - traefik.enable=true
